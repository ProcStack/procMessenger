<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>procMessenger</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- Connection -->
    <div class="section">
        <div class="section-title">Connection</div>
        <div class="connection-bar">
            <input type="text" id="serverIp" placeholder="IP address (LAN or Tailscale)" />
            <input type="number" id="serverPort" class="port-input" placeholder="Port" value="9734" />
            <button id="btnRecentIps" class="btn-recent" title="Recent connections">&larr;</button>
            <button id="btnConnect" class="btn-connect">Connect</button>
            <button id="btnDisconnect" class="btn-disconnect">Disconnect</button>
        </div>
        <div id="connectionStatus" class="status disconnected">Not connected</div>
    </div>

    <!-- Connected Computers (multi-select) -->
    <div class="section">
        <div class="section-title">Computers — tap to select targets</div>
        <div id="clientList">
            <div class="empty-list">No computers connected</div>
        </div>
    </div>

    <!-- Function Selection -->
    <div class="section">
        <div class="section-title">Function</div>
        <select id="functionSelect">
            <option value="" disabled selected>Select functionality...</option>
        </select>

        <!-- Dynamic panel — updates based on selected function -->
        <div id="dynamicPanel"></div>
    </div>

    <!-- Message Input -->
    <div class="section">
        <div class="section-title">Message</div>
        <textarea id="messageContent" rows="3" placeholder="Additional message content (optional)..."></textarea>
        <button id="btnSend">Send Message</button>
    </div>

    <!-- Modals -->

    <!-- Topic Creation Modal -->
    <div id="topicModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Topic</h3>
                <button class="btn-close-modal" onclick="closeTopicModal()">&times;</button>
            </div>
            <div class="modal-body">
                <label>Topic Name:</label>
                <input type="text" id="topicNameInput" placeholder="Enter topic name..." />
                <label>Topic Info (System Prompt addition):</label>
                <textarea id="topicInfoInput" rows="6" placeholder="Enter additional context here..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="createNewTopic()">Save Topic</button>
            </div>
        </div>
    </div>

    <!-- Topic Selection Modal -->
    <div id="topicSelectModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Topics</h3>
                <button class="btn-close-modal" onclick="closeTopicSelectModal()">&times;</button>
            </div>
            <div class="modal-body" id="topicSelectList">
                <div class="empty-list">Loading topics...</div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeTopicSelectModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Message Display — Tabbed by computer -->
    <div class="section">
        <div class="section-title">Responses</div>
        <div id="messageTabs">
            <div class="empty-list">No messages yet</div>
        </div>
        <div id="messageArea">
            <div class="empty-list">Messages will appear here</div>
        </div>
    </div>

    <!-- Chat History Modal (LLM) -->
    <div id="chatHistoryModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Chat History</h3>
                <button class="btn-close-modal" onclick="closeChatHistoryModal()">&times;</button>
            </div>
            <div class="modal-body" id="chatHistoryList">
                <div class="empty-list">Loading...</div>
            </div>
            <div class="modal-footer">
                <input type="text" id="newChatNameInput" placeholder="New chat name..." />
                <button class="btn-secondary" onclick="createNewChat()">Create</button>
            </div>
        </div>
    </div>

    <!-- Recent IPs Modal -->
    <div id="recentIpsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Recent Connections</h3>
                <button class="btn-close-modal" onclick="closeRecentIpsModal()">&times;</button>
            </div>
            <div class="modal-body" id="recentIpsList">
                <div class="empty-list">No recent connections</div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeRecentIpsModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- File Viewer Modal -->
    <div id="fileViewerModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span id="fileViewerTitle" class="file-viewer-title">File</span>
                <button class="btn-close-modal" onclick="closeFileViewerModal()">&times;</button>
            </div>
            <div class="modal-body">
                <img id="fileViewerImg" class="file-viewer-img" src="" alt="Preview" style="display:none" />
            </div>
            <div class="file-viewer-footer">
                <button id="fileViewerDownload" class="btn-secondary" onclick="fbDownloadFromViewer()">&#x2B07; Download</button>
            </div>
        </div>
    </div>

    <!-- Scripts: load order matters -->
    <script src="js/config.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
